# Basic config
quarkus.application.name=destino
quarkus.http.insecure-requests=redirect
quarkus.http.port=8888
quarkus.http.ssl-port=8080
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=
quarkus.datasource.username=
quarkus.datasource.password=

# IBGE API URLs
ibge.regioes.url=https://servicodados.ibge.gov.br/api/v1/localidades/regioes
ibge.estados.url=https://servicodados.ibge.gov.br/api/v1/localidades/estados
ibge.cidades.url.template=https://servicodados.ibge.gov.br/api/v1/localidades/estados/%s/municipios

# Quarkus SmallRye JWT
mp.jwt.verify.issuer=
mp.jwt.verify.publickey.location=
smallrye.jwt.sign.key.location=

# Quarkus CORS
quarkus.http.cors=true
quarkus.http.cors.origins=https://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.access-control-allow-credentials=true

# HTTPS
quarkus.http.ssl.certificate.key-store-file=
quarkus.http.ssl.certificate.key-store-password=

# Test
%test.quarkus.http.insecure-requests=enabled

# Necessario para build
quarkus.native.resources.includes=keystore.p12